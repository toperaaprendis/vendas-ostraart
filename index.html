<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ostra Art — Registro de Venda</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --roxo:       #7B3FA0;
    --roxo-dark:  #5A2E78;
    --roxo-light: #F3E8FF;
    --verde:      #1E8C6A;
    --verde-light:#E6F7F2;
    --azul:       #1B4F8A;
    --amarelo:    #F0B429;
    --laranja:    #D4722A;
    --rosa:       #E85D9A;
    --rosa-light: #FDE9F3;
    --azul-ceu:   #3AABCC;
    --bg:         #FAF7FF;
    --surface:    #FFFFFF;
    --border:     #DDD0F0;
    --text:       #2A1A3E;
    --muted:      #8B7AA0;
    --radius:     14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Dashed border texture pattern */
  @keyframes dash-move {
    to { stroke-dashoffset: -20; }
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--roxo-dark) 0%, var(--roxo) 60%, #9B55C0 100%);
    padding: 0 20px 18px;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 4px 20px rgba(91,46,120,0.35);
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 16px;
  }

  .logo-circle {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    border: 2.5px solid rgba(255,255,255,0.4);
  }

  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-text h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #FFF;
    letter-spacing: 0.5px;
    line-height: 1;
  }

  .header-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 3px;
    font-weight: 600;
  }

  .gear-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    color: #FFF;
    font-size: 18px;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    backdrop-filter: blur(4px);
  }

  /* Loja selector */
  .loja-bar {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .loja-bar::-webkit-scrollbar { display: none; }

  .loja-btn {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 99px;
    border: 2px solid var(--border);
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .loja-btn.active {
    background: var(--roxo);
    border-color: var(--roxo);
    color: #FFF;
    box-shadow: 0 3px 12px rgba(123,63,160,0.35);
  }

  /* Form body */
  .form-body {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Section card */
  .card {
    background: var(--surface);
    border-radius: 18px;
    border: 2px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px 10px;
    border-bottom: 1.5px dashed var(--border);
  }

  .card-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .card-icon.roxo  { background: var(--roxo-light); }
  .card-icon.verde { background: var(--verde-light); }
  .card-icon.rosa  { background: var(--rosa-light); }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .card-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Field */
  .field { display: flex; flex-direction: column; gap: 5px; }

  label {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input, select {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  input:focus, select:focus {
    border-color: var(--roxo);
    box-shadow: 0 0 0 3px var(--roxo-light);
    background: #fff;
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* Toggle buttons */
  .toggle-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .toggle-btn {
    padding: 12px 8px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }

  .toggle-btn.selected {
    background: var(--roxo-light);
    border-color: var(--roxo);
    color: var(--roxo-dark);
    box-shadow: 0 2px 8px rgba(123,63,160,0.2);
  }

  .toggle-btn.selected-verde {
    background: var(--verde-light);
    border-color: var(--verde);
    color: var(--verde);
  }

  /* Entrega extra fields */
  .entrega-fields {
    display: none;
    flex-direction: column;
    gap: 12px;
    padding: 14px 16px;
    background: var(--rosa-light);
    border-top: 1.5px dashed #F5B8D9;
  }
  .entrega-fields.show { display: flex; }

  /* Prefix input */
  .input-prefix { position: relative; }
  .input-prefix span {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    font-weight: 700;
    pointer-events: none;
  }
  .input-prefix input { padding-left: 36px; }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--roxo-dark), var(--roxo));
    color: #FFF;
    border: none;
    border-radius: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 19px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 16px rgba(123,63,160,0.4);
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 14px;
    border: 1.5px dashed rgba(255,255,255,0.3);
    pointer-events: none;
  }

  .btn-submit:active {
    transform: scale(0.98);
    box-shadow: 0 2px 8px rgba(123,63,160,0.3);
  }

  .btn-submit:disabled {
    background: #CCC;
    box-shadow: none;
    cursor: not-allowed;
  }

  /* Decorative dots stripe */
  .stripe {
    height: 6px;
    background: linear-gradient(90deg,
      var(--azul-ceu) 0%, var(--azul-ceu) 14.28%,
      var(--verde) 14.28% 28.57%,
      var(--amarelo) 28.57% 42.85%,
      var(--laranja) 42.85% 57.14%,
      var(--rosa) 57.14% 71.42%,
      var(--roxo) 71.42% 85.71%,
      var(--azul) 85.71% 100%
    );
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--text);
    color: #FFF;
    padding: 14px 24px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--verde); }
  .toast.error   { background: #C43A3A; }

  /* Config overlay */
  .config-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,26,62,0.55);
    z-index: 50;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .config-overlay.show { display: flex; }

  .config-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 8px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }

  .config-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 20px;
  }

  .config-inner {
    padding: 0 20px 40px;
  }

  .config-inner h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--roxo-dark);
    margin-bottom: 6px;
  }

  .config-inner p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: 600;
  }

  .config-btn {
    width: 100%;
    padding: 15px;
    background: var(--roxo);
    color: #FFF;
    border: none;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 17px;
    cursor: pointer;
    margin-top: 16px;
    box-shadow: 0 4px 14px rgba(123,63,160,0.35);
  }

  /* Color dots on header for flair */
  .color-dots {
    display: flex;
    gap: 5px;
    padding: 8px 20px 0;
    align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="stripe"></div>

<header>
  <div class="color-dots">
    <div class="dot" style="background:var(--azul-ceu)"></div>
    <div class="dot" style="background:var(--verde)"></div>
    <div class="dot" style="background:var(--amarelo)"></div>
    <div class="dot" style="background:var(--rosa)"></div>
    <div class="dot" style="background:var(--laranja)"></div>
  </div>
  <div class="header-inner">
    <div class="logo-circle">
      <img src="Logo_-_Ostra_Art_Prancheta_1_cópia_4_-_Copia.png" alt="Ostra Art" onerror="this.parentElement.innerHTML='🐚'">
    </div>
    <div class="header-text">
      <h1>Ostra Art</h1>
      <p id="lojaLabel">Selecione sua loja ↓</p>
    </div>
    <button class="gear-btn" onclick="openConfig()" title="Configurar">⚙</button>
  </div>
</header>

<div class="loja-bar">
  <button class="loja-btn" data-loja="Armarinho - Centro" onclick="selectLoja(this)">🧵 Armarinho Centro</button>
  <button class="loja-btn" data-loja="Armarinho - Bangu"  onclick="selectLoja(this)">🧵 Armarinho Bangu</button>
  <button class="loja-btn" data-loja="Havaianas"          onclick="selectLoja(this)">🩴 Havaianas</button>
</div>

<div class="form-body">

  <!-- Quem está vendendo -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon roxo">👩</div>
      <span class="card-title">Vendedora & Data</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Seu Nome</label>
        <input type="text" id="vendedora" placeholder="Digite seu nome" autocomplete="name">
      </div>
      <div class="field">
        <label>Data da Venda</label>
        <input type="date" id="data">
      </div>
    </div>
  </div>

  <!-- Pedido -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon verde">🛍️</div>
      <span class="card-title">Pedido</span>
    </div>
    <div class="card-body">

      <div class="field">
        <label>Fonte da Venda</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-val="WhatsApp" onclick="selectToggle('fonte', this)">💬<br>WhatsApp</button>
          <button class="toggle-btn" data-val="Instagram" onclick="selectToggle('fonte', this)">📸<br>Instagram</button>
        </div>
      </div>

      <div class="field" id="segmentoField">
        <label>Segmento do Produto</label>
        <div class="select-wrap">
          <select id="segmento">
            <option value="">Selecione o segmento...</option>
            <option>Crochê e Tricô</option>
            <option>Costura Criativa</option>
            <option>Pintura e Biscuit</option>
            <option>Bijuteria e Acessórios</option>
            <option>Laço e Decoração Infantil</option>
            <option>Bordado e Acabamentos</option>
            <option>Outros</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Quantidade de Itens</label>
        <input type="number" id="qtd" placeholder="Ex: 3" min="1" inputmode="numeric">
      </div>

      <div class="field">
        <label>Valor do Pedido</label>
        <div class="input-prefix">
          <span>R$</span>
          <input type="number" id="valor" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>

    </div>
  </div>

  <!-- Entrega -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon rosa">🛵</div>
      <span class="card-title">Entrega</span>
    </div>
    <div class="card-body" style="padding-bottom:0">
      <div class="field" style="padding-bottom:14px">
        <label>Modalidade</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-val="Retirada" onclick="selectToggle('entrega', this); toggleEntrega(false)">🏪<br>Retirada</button>
          <button class="toggle-btn" data-val="Entrega"  onclick="selectToggle('entrega', this); toggleEntrega(true)">🛵<br>Entrega</button>
        </div>
      </div>
    </div>

    <div class="entrega-fields" id="entregaFields">
      <div class="field">
        <label>Bairro de Entrega</label>
        <input type="text" id="bairro" placeholder="Ex: Centro, Bangu, Taquara...">
      </div>
      <div class="field">
        <label>Taxa do Motoboy</label>
        <div class="input-prefix">
          <span>R$</span>
          <input type="number" id="taxaMoto" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="btnEnviar" onclick="enviar()">
    🐚 Registrar Venda
  </button>

</div>

<!-- Config overlay -->
<div class="config-overlay" id="configOverlay" onclick="closeConfig(event)">
  <div class="config-sheet">
    <div class="config-handle"></div>
    <div class="config-inner">
      <h2>Configuração</h2>
      <p>Cole aqui a URL do Google Apps Script para conectar o formulário à planilha do Thiago.</p>
      <div class="field">
        <label>URL do Apps Script</label>
        <input type="url" id="configUrl" placeholder="https://script.google.com/macros/s/..." style="font-size:13px; padding:12px 14px; word-break:break-all;">
      </div>
      <div class="field" style="margin-top:12px">
        <label>Salvar meu nome (opcional)</label>
        <input type="text" id="configVendedora" placeholder="Seu nome para pré-preencher" style="font-size:15px; padding:12px 14px;">
      </div>
      <button class="config-btn" onclick="salvarConfig()">✓ Salvar configuração</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let lojaAtiva = '';
  let toggles = { fonte: '', entrega: '' };

  window.onload = () => {
    document.getElementById('data').valueAsDate = new Date();

    const url = localStorage.getItem('scriptUrl') || '';
    const nome = localStorage.getItem('vendedoraNome') || '';
    document.getElementById('configUrl').value = url;
    document.getElementById('configVendedora').value = nome;
    if (nome) document.getElementById('vendedora').value = nome;

    const lojaS = localStorage.getItem('lojaAtiva') || '';
    if (lojaS) {
      const btn = document.querySelector(`.loja-btn[data-loja="${lojaS}"]`);
      if (btn) selectLoja(btn);
    }
  };

  function selectLoja(btn) {
    document.querySelectorAll('.loja-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lojaAtiva = btn.dataset.loja;
    document.getElementById('lojaLabel').textContent = lojaAtiva;
    localStorage.setItem('lojaAtiva', lojaAtiva);

    const isHavaianas = lojaAtiva === 'Havaianas';
    document.getElementById('segmentoField').style.display = isHavaianas ? 'none' : '';
    if (isHavaianas) document.getElementById('segmento').value = '';
  }

  function selectToggle(group, btn) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.remove('selected', 'selected-verde');
    });
    btn.classList.add('selected');
    toggles[group] = btn.dataset.val;
  }

  function toggleEntrega(show) {
    document.getElementById('entregaFields').classList.toggle('show', show);
    if (!show) {
      document.getElementById('bairro').value = '';
      document.getElementById('taxaMoto').value = '';
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3200);
  }

  function openConfig() {
    document.getElementById('configOverlay').classList.add('show');
  }

  function closeConfig(e) {
    if (e.target === document.getElementById('configOverlay'))
      document.getElementById('configOverlay').classList.remove('show');
  }

  function salvarConfig() {
    const url = document.getElementById('configUrl').value.trim();
    const nome = document.getElementById('configVendedora').value.trim();
    localStorage.setItem('scriptUrl', url);
    localStorage.setItem('vendedoraNome', nome);
    if (nome) document.getElementById('vendedora').value = nome;
    document.getElementById('configOverlay').classList.remove('show');
    showToast('✓ Configuração salva!', 'success');
  }

  async function enviar() {
    if (!lojaAtiva)           { showToast('⚠ Selecione sua loja', 'error'); return; }
    const vendedora = document.getElementById('vendedora').value.trim();
    if (!vendedora)           { showToast('⚠ Informe seu nome', 'error'); return; }
    const data = document.getElementById('data').value;
    if (!data)                { showToast('⚠ Informe a data', 'error'); return; }
    if (!toggles.fonte)       { showToast('⚠ Selecione a fonte da venda', 'error'); return; }
    const segmento = document.getElementById('segmento').value;
    if (!segmento && lojaAtiva !== 'Havaianas') { showToast('⚠ Selecione o segmento', 'error'); return; }
    const qtd = document.getElementById('qtd').value;
    if (!qtd || qtd < 1)     { showToast('⚠ Informe a quantidade', 'error'); return; }
    const valor = document.getElementById('valor').value;
    if (!valor || valor <= 0) { showToast('⚠ Informe o valor do pedido', 'error'); return; }
    if (!toggles.entrega)     { showToast('⚠ Selecione retirada ou entrega', 'error'); return; }

    let bairro = '', taxaMoto = 0;
    if (toggles.entrega === 'Entrega') {
      bairro = document.getElementById('bairro').value.trim();
      if (!bairro)            { showToast('⚠ Informe o bairro de entrega', 'error'); return; }
      taxaMoto = parseFloat(document.getElementById('taxaMoto').value) || 0;
    }

    const scriptUrl = localStorage.getItem('scriptUrl') || '';
    if (!scriptUrl) { showToast('⚠ Configure a URL do script (⚙)', 'error'); return; }

    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    btn.textContent = '⏳ Enviando...';

    const payload = {
      loja: lojaAtiva, vendedora, data,
      fonte: toggles.fonte, segmento,
      qtd: parseInt(qtd),
      valor: parseFloat(valor),
      modalidade: toggles.entrega,
      bairro, taxaMotoboy: taxaMoto
    };

    try {
      await fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('🐚 Venda registrada!', 'success');
      resetForm();
    } catch (err) {
      showToast('✗ Erro ao enviar. Tente novamente.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '🐚 Registrar Venda';
    }
  }

  function resetForm() {
    document.getElementById('data').valueAsDate = new Date();
    toggles.fonte = '';
    toggles.entrega = '';
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected', 'selected-verde'));
    document.getElementById('segmento').value = '';
    document.getElementById('qtd').value = '';
    document.getElementById('valor').value = '';
    toggleEntrega(false);
  }
</script>
</body>
</html>
